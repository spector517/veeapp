server {
    listen 0.0.0.0:8443 ssl default_server;

    ssl_certificate /etc/letsencrypt/live/veeapp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veeapp/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    root /usr/local/etc/veeapp;
    index index.html;

    access_log /var/log/nginx/veeapp_access.log;
    error_log /var/log/nginx/veeapp_error.log;

    auth_basic "VeeApp";
    auth_basic_user_file /etc/nginx/veeapp.htpasswd;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(v3/api-docs|swagger-ui|api) {
        proxy_pass http://127.0.0.1:9099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}